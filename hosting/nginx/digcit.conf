# nginx site config for the Digital Citizenship Breakouts.
# ---------------------------------------------------------------------------
# FREE tier (Grades 3-5 + all top-level pages, correlation, guide, answer key)
# is served as static files from the web root. The PAID tier (/grade68/) and the
# /login and /logout routes are proxied to the Node auth gateway (hosting/server.js),
# which serves the protected grade68 tree only to an authenticated district session.
#
# IMPORTANT: keep the free and paid trees PHYSICALLY SEPARATE. Deploy the free
# site to /var/www/digcit WITHOUT the grade68/ folder, and deploy grade68/ to
# /srv/digcit-paid (outside the web root) where only the gateway can read it.
# That way a misconfigured static route can never leak paid files.

upstream digcit_app { server 127.0.0.1:8080; }

server {
    listen 80;
    listen [::]:80;
    server_name breakouts.example.org;          # <-- your domain
    # For TLS, terminate here (listen 443 ssl; ssl_certificate ...;) or via a
    # proxy such as Certbot/Let's Encrypt. Redirect 80 -> 443 in production.

    root /var/www/digcit;                        # FREE static tree (NO grade68/)
    index index.html;

    # Security headers (the pages also set referrer no-referrer themselves)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    # ---- PAID tier + auth: proxy to the Node gateway ----
    location /grade68/ { proxy_pass http://digcit_app; }
    location = /login  { proxy_pass http://digcit_app; }
    location = /logout { proxy_pass http://digcit_app; }
    location = /healthz { proxy_pass http://digcit_app; }

    location @app {
        proxy_pass         http://digcit_app;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Apply the proxy headers to the proxied locations above.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---- FREE static: everything else ----
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Long-cache the shared assets (fingerprint or bump on change)
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }
}
