# nginx site config for the Digital Citizenship Breakouts (with TLS).
# ---------------------------------------------------------------------------
# FREE tier (Grades 3-5 + all top-level pages: landing, library, correlation,
# guide, answer key) is served as static files from the web root. The PAID tier
# (/grade68/) plus /login and /logout are proxied to the Node auth gateway
# (hosting/server.js), which serves the protected grade68 tree only to an
# authenticated district session.
#
# Keep the free and paid trees PHYSICALLY SEPARATE: deploy the free site to
# /var/www/digcit WITHOUT grade68/, and deploy grade68/ to /srv/digcit-paid
# (outside the web root) where only the gateway can read it.
#
# TLS: obtain a certificate with Certbot BEFORE enabling the :443 block:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot certonly --webroot -w /var/www/digcit -d breakouts.example.org
# Certbot can also edit this file for you (sudo certbot --nginx); the block below
# shows the intended end state. Certbot auto-renews via its systemd timer.

upstream digcit_app { server 127.0.0.1:8080; }

# ---- HTTP :80 — ACME challenge + redirect everything else to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name breakouts.example.org;                 # <-- your domain

    location /.well-known/acme-challenge/ { root /var/www/digcit; }   # Certbot
    location / { return 301 https://$host$request_uri; }
}

# ---- HTTPS :443 — the real site ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name breakouts.example.org;                 # <-- your domain

    ssl_certificate     /etc/letsencrypt/live/breakouts.example.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/breakouts.example.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/digcit;                              # FREE static tree (NO grade68/)
    index index.html;

    # Security headers (the pages also set referrer no-referrer themselves)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    # Proxy headers reused by the proxied locations below
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---- PAID tier + auth: proxy to the Node gateway ----
    location /grade68/ { proxy_pass http://digcit_app; }
    location = /login  { proxy_pass http://digcit_app; }
    location = /logout { proxy_pass http://digcit_app; }
    location = /healthz { proxy_pass http://digcit_app; }

    # ---- FREE static: everything else ----
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Long-cache the shared assets (bump filenames or purge on change)
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }
}
